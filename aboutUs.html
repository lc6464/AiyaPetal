            <h1 class="panel__title" data-i18n="page.about.title">把押花构图搬到浏览器中</h1>
            <p class="panel__lead" data-i18n="page.about.lead">哎呀花 - 云押花平台服务于电子押花排版、教学演示和材料试样阶段，让真实花材在进入纸面前，先完成一轮高效率的数字构图。</p>

            </article>
            <article class="info-card">
                <h2 data-i18n="page.about.card3.title">适用场景</h2>
                <p data-i18n="page.about.card3.body">适合花艺课程、文创打样、纪念花册排版和线上协作前的快速构图讨论。</p>
